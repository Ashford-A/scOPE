{% set name = "scope-bio" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  # sha256 will be filled in after first PyPI upload

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv --no-deps

requirements:
  host:
    - python >=3.9
    - pip
    - setuptools >=68
  run:
    - python >=3.9
    - numpy >=1.24
    - scipy >=1.10
    - pandas >=1.5
    - scikit-learn >=1.3
    - anndata >=0.9
    - scanpy >=1.9
    - matplotlib-base >=3.6
    - seaborn >=0.12
    - joblib >=1.2

test:
  imports:
    - scope
    - scope.pipeline
    - scope.decomposition
    - scope.classification
    - scope.preprocessing
  requires:
    - pytest
  commands:
    - pytest tests/ -x -q

about:
  home: https://github.com/Ashford-A/scOPE
  summary: "scOPE: transfer-learning from bulk RNA-seq to infer per-cell mutation probabilities in scRNA-seq"
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - Ashford-A
